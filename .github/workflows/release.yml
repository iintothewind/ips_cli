name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
            cross: true

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

          - target: aarch64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      # Linux ARM64: install cross-compilation toolchain
      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.cross == true
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Determine binary name
        id: bin
        shell: bash
        run: |
          BIN=ips
          TARGET=${{ matrix.target }}
          if [[ "$TARGET" == *"windows"* ]]; then
            echo "name=${BIN}.exe" >> $GITHUB_OUTPUT
          else
            echo "name=${BIN}" >> $GITHUB_OUTPUT
          fi

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          BIN=${{ steps.bin.outputs.name }}
          TARGET=${{ matrix.target }}
          ARCHIVE="ips-${TARGET}.tar.gz"
          cp "target/${TARGET}/release/${BIN}" "${BIN}"
          tar czf "${ARCHIVE}" "${BIN}" README.md
          echo "ASSET=${ARCHIVE}" >> $GITHUB_ENV

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $BIN = "${{ steps.bin.outputs.name }}"
          $TARGET = "${{ matrix.target }}"
          $ARCHIVE = "ips-${TARGET}.zip"
          Copy-Item "target\${TARGET}\release\${BIN}" "${BIN}"
          Compress-Archive -Path "${BIN}", "README.md" -DestinationPath "${ARCHIVE}"
          "ASSET=${ARCHIVE}" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ips-${{ matrix.target }}
          path: ${{ env.ASSET }}
          retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
